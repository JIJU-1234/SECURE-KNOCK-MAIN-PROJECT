<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Send Reply</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>

    body {
      background-color: #2E4057;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #fff;
    }

    .form-card {
      background-color: #ffffff;
      color: #2E4057;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      margin-top: 50px;
    }

    .form-card h4 {
      text-align: center;
      margin-bottom: 25px;
      font-weight: 600;
      color: #2E4057;
    }

    .form-label {
      font-weight: 500;
    }

    .btn-primary {
      width: 100%;
      padding: 10px;
      font-weight: 500;
      background-color: #198754;
      border: none;
    }

    .btn-primary:hover {
      background-color: #145c32;
    }

    .messages {
      margin-top: 20px;
      text-align: center;
      font-weight: 500;
      color: green;
    }

    @media (max-width: 576px) {
      .form-card {
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="form-card">
          <h4>Send Reply</h4>
          <form method="POST" action="/myapp/admin_send_reply_post/" enctype="multipart/form-data">
            {% csrf_token %}
            <input type="hidden" value="{{ cid }}" name="cid">

            <!-- Reply Text -->
            <div class="mb-3">
              <label for="reply" class="form-label">Reply</label>
              <textarea class="form-control" id="reply" rows="5" name="reply" placeholder="Enter your reply..." required></textarea>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="btn btn-primary">Send Reply</button>
          </form>

          <!-- Messages -->
          {% for i in messages %}
            <div class="messages">{{ i }}</div>
          {% endfor %}
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
