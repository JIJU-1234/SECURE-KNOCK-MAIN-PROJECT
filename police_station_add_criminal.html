<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Criminal</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  body { background-color: #2E4057; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  .form-card { background-color: #ffffff; max-width: 700px; margin: 50px auto; padding: 30px 40px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
  .form-card h2 { text-align: center; color: #2E4057; margin-bottom: 30px; font-weight: 600; }
  .form-card .form-control { border-radius: 10px; padding: 10px; }
  .form-check-label { margin-left: 5px; }
  .form-card button { display: block; margin: 20px auto 0; padding: 10px 30px; border-radius: 10px; font-size: 16px; background-color: #2E4057; color: #fff; border: none; cursor: pointer; transition: 0.3s; }
  .form-card button:hover { background-color: darkred; }
  .message { display: block; text-align: center; margin-top: 15px; font-weight: 500; color: green; }
  .error-msg { color: red; font-size: 14px; margin-bottom: 10px; display: block; }
</style>
</head>
<body>

<div class="form-card">
  <h2>Add Criminal</h2>
  <form id="criminalForm" method="POST" action="/myapp/police_station_add_criminal_post/" enctype="multipart/form-data">
    {% csrf_token %}

    <!-- Name -->
    <div class="mb-3 row">
      <label class="col-sm-4 col-form-label">Name</label>
      <div class="col-sm-8">
        <input type="text" class="form-control" id="name" name="name" required>
        <span class="error-msg" id="nameError"></span>
      </div>
    </div>

    <!-- Place -->
    <div class="mb-3 row">
      <label class="col-sm-4 col-form-label">Place</label>
      <div class="col-sm-8">
        <input type="text" class="form-control" id="place" name="place" required>
        <span class="error-msg" id="placeError"></span>
      </div>
    </div>

    <!-- Post -->
    <div class="mb-3 row">
      <label class="col-sm-4 col-form-label">Post</label>
      <div class="col-sm-8">
        <input type="text" class="form-control" id="post" name="post" required>
        <span class="error-msg" id="postError"></span>
      </div>
    </div>

    <!-- Pin -->
    <div class="mb-3 row">
      <label class="col-sm-4 col-form-label">Pin</label>
      <div class="col-sm-8">
        <input type="text" class="form-control" id="pin" name="pin" required maxlength="6">
        <span class="error-msg" id="pinError"></span>
      </div>
    </div>

    <!-- District -->
    <div class="mb-3 row">
      <label class="col-sm-4 col-form-label">District</label>
      <div class="col-sm-8">
        <input type="text" class="form-control" id="district" name="district" required>
        <span class="error-msg" id="districtError"></span>
      </div>
    </div>

    <!-- State -->
    <div class="mb-3 row">
      <label class="col-sm-4 col-form-label">State</label>
      <div class="col-sm-8">
        <input type="text" class="form-control" id="state" name="state" required>
        <span class="error-msg" id="stateError"></span>
      </div>
    </div>

    <!-- Country -->
    <div class="mb-3 row">
      <label class="col-sm-4 col-form-label">Country</label>
      <div class="col-sm-8">
        <input type="text" class="form-control" id="country" name="country" required>
        <span class="error-msg" id="countryError"></span>
      </div>
    </div>

    <!-- Gender -->
    <div class="mb-3 row">
      <label class="col-sm-4 col-form-label">Gender</label>
      <div class="col-sm-8">
        <div class="form-check form-check-inline">
          <input class="form-check-input" type="radio" name="gender" value="Male" id="male" required>
          <label class="form-check-label" for="male">Male</label>
        </div>
        <div class="form-check form-check-inline">
          <input class="form-check-input" type="radio" name="gender" value="Female" id="female">
          <label class="form-check-label" for="female">Female</label>
        </div>
        <span class="error-msg" id="genderError"></span>
      </div>
    </div>

    <!-- DOB -->
    <div class="mb-3 row">
      <label class="col-sm-4 col-form-label">Date of Birth</label>
      <div class="col-sm-8">
        <input type="date" class="form-control" id="dob" name="dob" required max="2006-12-31">
        <span class="error-msg" id="dobError"></span>
      </div>
    </div>

    <!-- Height -->
    <div class="mb-3 row">
      <label class="col-sm-4 col-form-label">Height (cm)</label>
      <div class="col-sm-8">
        <input type="text" class="form-control" id="height" name="height" required>
        <span class="error-msg" id="heightError"></span>
      </div>
    </div>

    <!-- Weight -->
    <div class="mb-3 row">
      <label class="col-sm-4 col-form-label">Weight (kg)</label>
      <div class="col-sm-8">
        <input type="text" class="form-control" id="weight" name="weight" required>
        <span class="error-msg" id="weightError"></span>
      </div>
    </div>

    <!-- Identification Mark -->
    <div class="mb-3 row">
      <label class="col-sm-4 col-form-label">Identification Mark</label>
      <div class="col-sm-8">
        <input type="text" class="form-control" id="idenification_mark" name="idenification_mark" required>
        <span class="error-msg" id="idMarkError"></span>
      </div>
    </div>

    <!-- Arrest Information -->
    <div class="mb-3 row">
      <label class="col-sm-4 col-form-label">Arrest Information</label>
      <div class="col-sm-8">
        <input type="text" class="form-control" id="arrest_information" name="arrest_information" required>
        <span class="error-msg" id="arrestError"></span>
      </div>
    </div>

    <!-- Charges -->
    <div class="mb-3 row">
      <label class="col-sm-4 col-form-label">Charges</label>
      <div class="col-sm-8">
        <input type="text" class="form-control" id="charges" name="charges" required>
        <span class="error-msg" id="chargesError"></span>
      </div>
    </div>

    <!-- Photo -->
    <div class="mb-3 row">
      <label class="col-sm-4 col-form-label">Upload Photo</label>
      <div class="col-sm-8">
        <input type="file" class="form-control" id="photo" name="photo" accept="image/*" required>
        <span class="error-msg" id="photoError"></span>
      </div>
    </div>

    <button type="submit">Register</button>
  </form>

  {% for i in messages %}
    <span class="message">{{ i }}</span>
  {% endfor %}
</div>

<script>
const form = document.getElementById('criminalForm');

// --- Live validation for Name (capital first letter) ---
document.getElementById('name').addEventListener('input', function(){
  const val = this.value.trim();
  if(/^[A-Z][a-zA-Z ]*$/.test(val)){
    document.getElementById('nameError').textContent='';
  } else {
    document.getElementById('nameError').textContent='Start with capital letter, letters & spaces only';
  }
});

// --- Live validation for number fields ---
['pin','height','weight'].forEach(id=>{
  const input = document.getElementById(id);
  input.addEventListener('input', ()=>{
    if(/^\d+$/.test(input.value.trim())){
      document.getElementById(id+'Error').textContent='';
    } else {
      document.getElementById(id+'Error').textContent='Numbers only';
    }
  });
});

// --- DOB ---
document.getElementById('dob').addEventListener('change', function(){
  const year = new Date(this.value).getFullYear();
  document.getElementById('dobError').textContent = (year>2006)? 'Year must be 2006 or earlier' : '';
});

// --- Gender ---
document.querySelectorAll('input[name="gender"]').forEach(radio=>{
  radio.addEventListener('change', ()=> document.getElementById('genderError').textContent='');
});

// --- Photo ---
document.getElementById('photo').addEventListener('change', function(){
  document.getElementById('photoError').textContent = (this.files.length===0)? 'Select a photo' : '';
});

// --- Submit ---
form.addEventListener('submit', function(e){
  let valid = true;

  // Name
  const name = document.getElementById('name').value.trim();
  if(!/^[A-Z][a-zA-Z ]*$/.test(name)){ document.getElementById('nameError').textContent='Start with capital letter, letters & spaces only'; valid=false;}

  // Number fields
  ['pin','height','weight'].forEach(id=>{
    const val = document.getElementById(id).value.trim();
    if(!/^\d+$/.test(val)){
      document.getElementById(id+'Error').textContent='Numbers only';
      valid=false;
    }
  });

  // Pin 6 digits
  if(document.getElementById('pin').value.trim().length!==6){document.getElementById('pinError').textContent='Pin must be 6 digits'; valid=false;}

  // DOB
  const year = new Date(document.getElementById('dob').value).getFullYear();
  if(year>2006){document.getElementById('dobError').textContent='Year must be 2006 or earlier'; valid=false;}

  // Gender
  if(!document.querySelector('input[name="gender"]:checked')){document.getElementById('genderError').textContent='Select gender'; valid=false;}

  // Photo
  if(document.getElementById('photo').files.length===0){document.getElementById('photoError').textContent='Select a photo'; valid=false;}

  if(!valid) e.preventDefault();
});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
