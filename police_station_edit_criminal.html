<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Edit Criminal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #2E4057;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .form-card {
      background-color: #ffffff;
      max-width: 700px;
      margin: 40px auto;
      padding: 30px 25px;
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    .form-card h2 {
      text-align: center;
      color: #2E4057;
      margin-bottom: 25px;
      font-weight: 600;
    }

    .form-card input.form-control {
      margin-bottom: 10px;
      border-radius: 10px;
      padding: 10px;
    }

    .form-check-label { margin-left: 5px; }

    .update-btn {
      background-color: darkred;
      color: #fff;
      border: none;
      padding: 12px 30px;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      display: block;
      margin: 0 auto;
      transition: 0.3s;
    }

    .update-btn:hover { opacity: 0.85; }

    .preview {
      margin-bottom: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    .message { display: block; text-align: center; margin-top: 15px; font-weight: 500; color: green; }
    .error-msg { color: red; font-size: 14px; display: block; margin-bottom: 5px; }
  </style>
</head>
<body>

<div class="form-card">
    <h2>Edit Criminal</h2>
    <form id="editCriminalForm" method="POST" action="/myapp/edit_criminal_post/" enctype="multipart/form-data">
        {% csrf_token %}
        <input type="hidden" name="cid" value="{{ data.id }}">

        <!-- Name -->
        <div class="row mb-3">
          <label class="col-sm-4 col-form-label">Name</label>
          <div class="col-sm-8">
            <input type="text" class="form-control" id="name" name="name" value="{{ data.name }}" required>
            <span class="error-msg" id="nameError"></span>
          </div>
        </div>

        <!-- Place -->
        <div class="row mb-3">
          <label class="col-sm-4 col-form-label">Place</label>
          <div class="col-sm-8">
            <input type="text" class="form-control" id="place" name="place" value="{{ data.place }}" required>
            <span class="error-msg" id="placeError"></span>
          </div>
        </div>

        <!-- Post -->
        <div class="row mb-3">
          <label class="col-sm-4 col-form-label">Post</label>
          <div class="col-sm-8">
            <input type="text" class="form-control" id="post" name="post" value="{{ data.post }}" required>
            <span class="error-msg" id="postError"></span>
          </div>
        </div>

        <!-- Pin -->
        <div class="row mb-3">
          <label class="col-sm-4 col-form-label">Pin</label>
          <div class="col-sm-8">
            <input type="text" class="form-control" id="pin" name="pin" value="{{ data.pin }}" required maxlength="6">
            <span class="error-msg" id="pinError"></span>
          </div>
        </div>

        <!-- District -->
        <div class="row mb-3">
          <label class="col-sm-4 col-form-label">District</label>
          <div class="col-sm-8">
            <input type="text" class="form-control" id="district" name="district" value="{{ data.district }}" required>
            <span class="error-msg" id="districtError"></span>
          </div>
        </div>

        <!-- State -->
        <div class="row mb-3">
          <label class="col-sm-4 col-form-label">State</label>
          <div class="col-sm-8">
            <input type="text" class="form-control" id="state" name="state" value="{{ data.state }}" required>
            <span class="error-msg" id="stateError"></span>
          </div>
        </div>

        <!-- Country -->
        <div class="row mb-3">
          <label class="col-sm-4 col-form-label">Country</label>
          <div class="col-sm-8">
            <input type="text" class="form-control" id="country" name="country" value="{{ data.country }}" required>
            <span class="error-msg" id="countryError"></span>
          </div>
        </div>

        <!-- Gender -->
        <div class="row mb-3">
          <label class="col-sm-4 col-form-label">Gender</label>
          <div class="col-sm-8">
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" name="gender" value="Male" {% if data.gender == "Male" %} checked {% endif %}>
              <label class="form-check-label">Male</label>
            </div>
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" name="gender" value="Female" {% if data.gender == "Female" %} checked {% endif %}>
              <label class="form-check-label">Female</label>
            </div>
            <span class="error-msg" id="genderError"></span>
          </div>
        </div>

        <!-- DOB -->
        <div class="row mb-3">
          <label class="col-sm-4 col-form-label">Date of Birth</label>
          <div class="col-sm-8">
            <input type="date" class="form-control" id="dob" name="dob" value="{{ data.dob }}" required max="2006-12-31">
            <span class="error-msg" id="dobError"></span>
          </div>
        </div>

        <!-- Height -->
        <div class="row mb-3">
          <label class="col-sm-4 col-form-label">Height</label>
          <div class="col-sm-8">
            <input type="text" class="form-control" id="height" name="height" value="{{ data.height }}" required>
            <span class="error-msg" id="heightError"></span>
          </div>
        </div>

        <!-- Weight -->
        <div class="row mb-3">
          <label class="col-sm-4 col-form-label">Weight</label>
          <div class="col-sm-8">
            <input type="text" class="form-control" id="weight" name="weight" value="{{ data.weight }}" required>
            <span class="error-msg" id="weightError"></span>
          </div>
        </div>

        <!-- Identification Mark -->
        <div class="row mb-3">
          <label class="col-sm-4 col-form-label">Identification Mark</label>
          <div class="col-sm-8">
            <input type="text" class="form-control" id="identification_mark" name="identification_mark" value="{{ data.identification_mark }}" required>
            <span class="error-msg" id="identificationMarkError"></span>
          </div>
        </div>

        <!-- Arrest Information -->
        <div class="row mb-3">
          <label class="col-sm-4 col-form-label">Arrest Information</label>
          <div class="col-sm-8">
            <input type="text" class="form-control" name="arrest_information" value="{{ data.arrest_information }}" required>
          </div>
        </div>

        <!-- Charges -->
        <div class="row mb-3">
          <label class="col-sm-4 col-form-label">Charges</label>
          <div class="col-sm-8">
            <input type="text" class="form-control" name="charges" value="{{ data.charges }}" required>
          </div>
        </div>

        <!-- Photo -->
        <div class="row mb-3">
          <label class="col-sm-4 col-form-label">Upload Photo</label>
          <div class="col-sm-8">
            <img src="{{ data.photo }}" alt="Current Photo" width="100" height="100" class="preview">
            <input type="file" class="form-control" id="photo" name="photo" accept="image/*">
            <span class="error-msg" id="photoError"></span>
          </div>
        </div>

        <button type="submit" class="update-btn">Update</button>
    </form>

    {% for i in messages %}
        <span class="message">{{ i }}</span>
    {% endfor %}
</div>

<script>
const form = document.getElementById('editCriminalForm');

// Name validation: capital first letter
document.getElementById('name').addEventListener('input', function(){
  const val = this.value.trim();
  document.getElementById('nameError').textContent = /^[A-Z][a-zA-Z ]*$/.test(val) ? '' : 'Start with capital letter, letters & spaces only';
});

// Pin live validation: exactly 6 digits
document.getElementById('pin').addEventListener('input', function(){
  const val = this.value.trim();
  document.getElementById('pinError').textContent = /^\d{6}$/.test(val) ? '' : 'Pin must be 6 digits';
});

// Height & Weight numbers only
['height','weight'].forEach(id=>{
  const input = document.getElementById(id);
  input.addEventListener('input', ()=>{
    document.getElementById(id+'Error').textContent = /^\d+$/.test(input.value.trim()) ? '' : 'Numbers only';
  });
});

// Identification Mark validation (required live check)
document.getElementById('identification_mark').addEventListener('input', function(){
  const val = this.value.trim();
  document.getElementById('identificationMarkError').textContent = val ? '' : 'This field is required';
});

// DOB validation
document.getElementById('dob').addEventListener('change', function(){
  const year = new Date(this.value).getFullYear();
  document.getElementById('dobError').textContent = (year>2006)? 'Year must be 2006 or earlier' : '';
});

// Gender validation
document.querySelectorAll('input[name="gender"]').forEach(radio=>{
  radio.addEventListener('change', ()=> document.getElementById('genderError').textContent='');
});

// Form submit validation
form.addEventListener('submit', function(e){
  let valid = true;

  // Name
  if(!/^[A-Z][a-zA-Z ]*$/.test(document.getElementById('name').value.trim())){
    document.getElementById('nameError').textContent='Start with capital letter, letters & spaces only';
    valid=false;
  }

  // Pin
  if(!/^\d{6}$/.test(document.getElementById('pin').value.trim())){
    document.getElementById('pinError').textContent='Pin must be 6 digits';
    valid=false;
  }

  // Height & Weight
  ['height','weight'].forEach(id=>{
    if(!/^\d+$/.test(document.getElementById(id).value.trim())){
      document.getElementById(id+'Error').textContent='Numbers only';
      valid=false;
    }
  });

  // Identification Mark
  if(!document.getElementById('identification_mark').value.trim()){
    document.getElementById('identificationMarkError').textContent='This field is required';
    valid=false;
  }

  // DOB
  const year = new Date(document.getElementById('dob').value).getFullYear();
  if(year>2006){
    document.getElementById('dobError').textContent='Year must be 2006 or earlier';
    valid=false;
  }

  // Gender
  if(!document.querySelector('input[name="gender"]:checked')){
    document.getElementById('genderError').textContent='Select gender';
    valid=false;
  }

  if(!valid) e.preventDefault();
});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
